<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Agent Diary</title>
    
    <!-- Libraries -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --accent: #bc8cf2; --text: #ffffff; --ai-color: #4285f4; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; }
        
        /* Layout Containers */
        .app-container { max-width: 800px; margin: auto; padding: 20px; box-sizing: border-box; }
        #login-page { 
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1517842645767-c639042777db?auto=format&fit=crop&w=1200&q=80');
            background-size: cover; position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
        }

        /* App Pages */
        #app-interface { display: none; }
        #note-page { display: none; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

        /* UI Elements */
        #calendar { background: var(--card); border-radius: 15px; padding: 15px; border: 1px solid #333; }
        input.highlight-box { width: 100%; padding: 15px; background: #222; border: 1px solid #444; color: white; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; }
        .ql-container { height: 300px; background: #222; color: white; border-radius: 0 0 10px 10px; font-size: 1.1rem; }
        .ql-toolbar { background: #eee !important; border-radius: 10px 10px 0 0; }

        /* AI Insight Box */
        #ai-box { 
            background: rgba(66, 133, 244, 0.1); border: 1px solid var(--ai-color); 
            padding: 15px; border-radius: 10px; margin-top: 20px; display: none;
        }
        .ai-title { color: var(--ai-color); font-weight: bold; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }

        /* Buttons */
        button { padding: 12px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-ai { background: var(--ai-color); color: white; width: 100%; margin-top: 10px; font-size: 1rem; }
        .btn-save { background: var(--accent); color: black; width: 100%; margin-top: 10px; }
        .btn-voice { background: #4caf50; color: white; width: 100%; margin-top: 10px; }
        .btn-back { background: #333; color: white; }

        @media (max-width: 600px) { .app-container { padding: 10px; } }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-page">
        <h1 style="color:white; font-size: 3rem;">મારી ડાયરી AI</h1>
        <button style="background: white; color: black; padding: 15px 40px; font-size: 1.2rem;" onclick="login()">Login with Google</button>
    </div>

    <!-- MAIN APP -->
    <div id="app-interface">
        <div class="app-container">
            
            <!-- CALENDAR PAGE -->
            <div id="calendar-page">
                <div class="toolbar">
                    <h2 style="color:var(--accent); margin:0;">નમસ્તે, ડાયરી</h2>
                    <button onclick="logout()" style="background:#333; color:#ff4444;">Logout</button>
                </div>
                <div id="calendar"></div>
            </div>

            <!-- ENTRY PAGE -->
            <div id="note-page">
                <div class="toolbar">
                    <button class="btn-back" onclick="showCalendar()">← Back</button>
                    <div id="display-date" style="color:var(--accent); font-weight:bold;">Date</div>
                </div>

                <input type="text" id="highlight" class="highlight-box" placeholder="Daily Highlight (ટૂંકમાં વિગત)">
                <div id="editor"></div>
                
                <button class="btn-ai" id="ai-btn" onclick="askAI()">✨ Get AI Insights (Gujarati)</button>
                
                <div id="ai-box">
                    <div class="ai-title">🤖 AI Agent Insight:</div>
                    <div id="ai-response" style="font-style: italic; line-height: 1.5;"></div>
                </div>

                <button class="btn-voice" onclick="startSpeech()">🎤 Speak in Gujarati</button>
                <button class="btn-save" onclick="saveEntry()">Save Entry</button>
                <p id="status-msg" style="text-align: center; color: #03dac6; margin-top: 10px;"></p>
            </div>

        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
            const firebaseConfig = {
  apiKey: "AIzaSyCxWGAjeG5OTK1XkpwqtCCmLIz2UN8vAps",
  authDomain: "nirajk-diary.firebaseapp.com",
  projectId: "nirajk-diary",
  storageBucket: "nirajk-diary.firebasestorage.app",
  messagingSenderId: "716509879684",
  appId: "1:716509879684:web:f49ffa26687e1b3ce291d1"
};

        const GEMINI_API_KEY = "AIzaSyB8iP6-B3vCIAp2PauivDQ7TXAeG2XVkzU";

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let selectedDate = "";
        let quill = new Quill('#editor', { theme: 'snow', modules: { toolbar: [['bold', 'italic', 'underline'], [{'list': 'bullet'}]] } });
        let calendar;

        // --- AI FUNCTION (GEMINI) ---
        async function askAI() {
            const entryText = quill.getText().trim();
            if (entryText.length < 10) {
                alert("Please write at least a few sentences first!");
                return;
            }

            const aiBtn = document.getElementById('ai-btn');
            const aiBox = document.getElementById('ai-box');
            const aiResponse = document.getElementById('ai-response');

            aiBtn.innerText = "⌛ AI is thinking...";
            aiResponse.innerText = "તમારી ડાયરી વાંચી રહ્યા છીએ...";
            aiBox.style.display = "block";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Read this diary entry: "${entryText}". 
                        Provide a short, supportive, and insightful response in Gujarati language. 
                        Also, detect the mood in one word.` }] }]
                    })
                });

                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                aiResponse.innerText = text;
            } catch (error) {
                aiResponse.innerText = "Error connecting to AI. Check your API key.";
            } finally {
                aiBtn.innerText = "✨ Get AI Insights (Gujarati)";
            }
        }

        // --- CALENDAR & DATABASE LOGIC ---
        function initCalendar() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                height: 'auto',
                dateClick: (info) => openDiary(info.dateStr),
                events: async function(info, success) {
                    const user = auth.currentUser;
                    const snapshot = await db.collection("diaryEntries").where("uid", "==", user.uid).get();
                    success(snapshot.docs.map(doc => ({ title: doc.data().highlight || "📄", start: doc.data().date, color: '#bc8cf2', textColor: 'black' })));
                }
            });
            calendar.render();
        }

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { auth.signOut(); location.reload(); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('app-interface').style.display = 'block';
                initCalendar();
            }
        });

        function openDiary(date) {
            selectedDate = date;
            document.getElementById('calendar-page').style.display = 'none';
            document.getElementById('note-page').style.display = 'block';
            document.getElementById('display-date').innerText = date;
            document.getElementById('ai-box').style.display = 'none';
            loadEntry(date);
        }

        function showCalendar() {
            document.getElementById('calendar-page').style.display = 'block';
            document.getElementById('note-page').style.display = 'none';
            calendar.refetchEvents();
        }

        async function loadEntry(date) {
            const user = auth.currentUser;
            const doc = await db.collection("diaryEntries").doc(`${user.uid}_${date}`).get();
            if (doc.exists) {
                quill.root.innerHTML = doc.data().text;
                document.getElementById('highlight').value = doc.data().highlight || "";
            } else {
                quill.root.innerHTML = "";
                document.getElementById('highlight').value = "";
            }
        }

        async function saveEntry() {
            const user = auth.currentUser;
            document.getElementById('status-msg').innerText = "Saving...";
            await db.collection("diaryEntries").doc(`${user.uid}_${selectedDate}`).set({
                uid: user.uid, date: selectedDate,
                text: quill.root.innerHTML,
                highlight: document.getElementById('highlight').value
            });
            document.getElementById('status-msg').innerText = "✓ Saved Successfully!";
            setTimeout(() => { document.getElementById('status-msg').innerText = ""; }, 3000);
        }

        function startSpeech() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'gu-IN';
            recognition.onstart = () => { document.getElementById('status-msg').innerText = "Listening Gujarati..."; };
            recognition.onresult = (event) => { quill.insertText(quill.getLength(), " " + event.results[0][0].transcript); };
            recognition.start();
        }
    </script>
</body>
</html>
