<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Professional Private Diary</title>
    
    <!-- Libraries -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <style>
        :root { 
            --bg: #0f0f0f; 
            --card: #1a1a1a; 
            --accent: #bc8cf2; 
            --holiday: #ff9933; 
            --text: #ffffff;
            --btn-voice: #4caf50;
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* 1. LOGIN PAGE STYLING */
        #login-page { 
            height: 100vh; width: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1517842645767-c639042777db?auto=format&fit=crop&w=1200&q=80'); 
            background-size: cover; background-position: center;
            position: fixed; top: 0; left: 0; z-index: 1000;
        }

        /* 2. RESPONSIVE CONTAINER (Applied to both pages) */
        .app-container { 
            max-width: 800px; /* Limits width on Desktop */
            margin: auto; 
            padding: 20px; 
            box-sizing: border-box;
        }

        #app-interface { display: none; }

        /* Header Layout */
        .toolbar { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; gap: 10px;
        }
        .date-display { font-size: 1.2rem; font-weight: bold; color: var(--accent); }

        /* Calendar Box */
        #calendar { background: var(--card); border-radius: 15px; padding: 15px; border: 1px solid #333; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .fc .fc-toolbar-title { font-size: 1.2rem !important; color: var(--accent); }
        .fc-daygrid-day-number { color: white !important; text-decoration: none !important; }

        /* Diary Entry Components */
        #note-page { display: none; }
        input.highlight-box { 
            width: 100%; padding: 15px; background: #222; border: 1px solid #444; 
            color: white; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; font-size: 1rem;
        }

        /* Rich Text Editor Styling */
        #editor-wrapper { border-radius: 10px; overflow: hidden; border: 1px solid #444; }
        .ql-toolbar { background: #eee !important; border: none !important; }
        .ql-container { height: 350px; background: #222; color: white; border: none !important; font-size: 1.1rem; }

        /* Buttons Styling */
        button { 
            padding: 12px 24px; border-radius: 8px; border: none; font-weight: bold; 
            cursor: pointer; transition: 0.2s; font-size: 1rem;
        }
        .btn-back { background: #333; color: white; }
        .btn-save { background: var(--accent); color: black; flex-grow: 1; }
        .btn-voice { background: var(--btn-voice); color: white; flex-grow: 1; }
        .button-group { display: flex; gap: 10px; margin-top: 20px; width: 100%; }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .app-container { padding: 10px; }
            .button-group { flex-direction: column; }
            .ql-container { height: 300px; }
            .date-display { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <!-- SCREEN 1: LOGIN -->
    <div id="login-page">
        <h1 style="color:white; font-size: 3rem; margin: 0;">મારી ડાયરી</h1>
        <p style="color: #ccc; margin-bottom: 30px;">તમારા વિચારોને સુરક્ષિત રાખો.</p>
        <button style="background: white; color: black; padding: 15px 40px; font-size: 1.2rem;" onclick="login()">Login with Google</button>
    </div>

    <!-- SCREEN 2: THE APP -->
    <div id="app-interface">
        
        <!-- THE WRAPPER THAT CENTERS EVERYTHING -->
        <div class="app-container">

            <!-- PAGE: CALENDAR -->
            <div id="calendar-page">
                <div class="toolbar">
                    <h2 style="color:var(--accent); margin:0;">Namaste!</h2>
                    <button onclick="logout()" style="background:#333; color:#ff4444;">Logout</button>
                </div>
                <div id="calendar"></div>
            </div>

            <!-- PAGE: DIARY ENTRY -->
            <div id="note-page">
                <div class="toolbar">
                    <button class="btn-back" onclick="showCalendar()">← Back</button>
                    <div id="display-date" class="date-display">Date</div>
                </div>

                <p id="holiday-info" style="color:var(--holiday); font-weight:bold; margin-bottom:10px;"></p>
                
                <input type="text" id="highlight" class="highlight-box" placeholder="Daily Highlight (ટૂંકમાં વિગત)">
                
                <div id="editor-wrapper">
                    <div id="editor"></div>
                </div>
                
                <div class="button-group">
                    <button class="btn-voice" onclick="startSpeech()">🎤 Speak in Gujarati</button>
                    <button class="btn-save" onclick="saveEntry()">Save Entry</button>
                </div>
                <p id="status-msg" style="text-align: center; color: #03dac6; margin-top: 15px; font-weight: bold;"></p>
            </div>

        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
         const firebaseConfig = {
  apiKey: "AIzaSyCxWGAjeG5OTK1XkpwqtCCmLIz2UN8vAps",
  authDomain: "nirajk-diary.firebaseapp.com",
  projectId: "nirajk-diary",
  storageBucket: "nirajk-diary.firebasestorage.app",
  messagingSenderId: "716509879684",
  appId: "1:716509879684:web:f49ffa26687e1b3ce291d1"
};
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let selectedDate = "";
        let quill;
        let calendar;

        const indianHolidays = [
            { title: "🇮🇳 Republic Day", start: "2024-01-26", className: "holiday-event" },
            { title: "🎨 Holi", start: "2024-03-25", className: "holiday-event" },
            { title: "🇮🇳 Independence Day", start: "2024-08-15", className: "holiday-event" },
            { title: "🪔 Diwali", start: "2024-10-31", className: "holiday-event" },
            { title: "🪁 Uttarayan", start: "2025-01-14", className: "holiday-event" },
            { title: "🇮🇳 Republic Day", start: "2025-01-26", className: "holiday-event" }
        ];

        quill = new Quill('#editor', {
            theme: 'snow',
            modules: { toolbar: [['bold', 'italic', 'underline'], [{'list': 'bullet'}]] }
        });

        function initCalendar() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                height: 'auto',
                headerToolbar: { left: 'prev,next', center: 'title', right: 'today' },
                dateClick: (info) => openDiary(info.dateStr),
                events: async function(info, success) {
                    const user = auth.currentUser;
                    const snapshot = await db.collection("diaryEntries").where("uid", "==", user.uid).get();
                    const userEvents = snapshot.docs.map(doc => ({
                        title: doc.data().highlight || "📄 Log",
                        start: doc.data().date,
                        backgroundColor: '#bc8cf2',
                        borderColor: '#bc8cf2',
                        textColor: 'black'
                    }));
                    success([...indianHolidays, ...userEvents]);
                }
            });
            calendar.render();
        }

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { auth.signOut(); location.reload(); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('app-interface').style.display = 'block';
                initCalendar();
            } else {
                document.getElementById('login-page').style.display = 'flex';
                document.getElementById('app-interface').style.display = 'none';
            }
        });

        function openDiary(date) {
            selectedDate = date;
            document.getElementById('calendar-page').style.display = 'none';
            document.getElementById('note-page').style.display = 'block';
            document.getElementById('display-date').innerText = date;
            const hol = indianHolidays.find(h => h.start === date);
            document.getElementById('holiday-info').innerText = hol ? "Holiday: " + hol.title : "";
            loadEntry(date);
        }

        function showCalendar() {
            document.getElementById('calendar-page').style.display = 'block';
            document.getElementById('note-page').style.display = 'none';
            calendar.refetchEvents();
        }

        async function loadEntry(date) {
            const user = auth.currentUser;
            const doc = await db.collection("diaryEntries").doc(`${user.uid}_${date}`).get();
            if (doc.exists) {
                quill.root.innerHTML = doc.data().text;
                document.getElementById('highlight').value = doc.data().highlight || "";
            } else {
                quill.root.innerHTML = "";
                document.getElementById('highlight').value = "";
            }
        }

        async function saveEntry() {
            const user = auth.currentUser;
            document.getElementById('status-msg').innerText = "Saving to Cloud...";
            await db.collection("diaryEntries").doc(`${user.uid}_${selectedDate}`).set({
                uid: user.uid, date: selectedDate,
                text: quill.root.innerHTML,
                highlight: document.getElementById('highlight').value
            });
            document.getElementById('status-msg').innerText = "✓ Saved Successfully!";
            setTimeout(() => { document.getElementById('status-msg').innerText = ""; }, 3000);
        }

        function startSpeech() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'gu-IN';
            recognition.onstart = () => { document.getElementById('status-msg').innerText = "Listening Gujarati... બોલો..."; };
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                quill.insertText(quill.getLength(), " " + text);
            };
            recognition.onend = () => { document.getElementById('status-msg').innerText = ""; };
            recognition.start();
        }
    </script>
</body>
</html>
