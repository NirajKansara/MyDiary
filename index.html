<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Diary + Gujarati Voice</title>
    
    <!-- Firebase & Tools -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <style>
        /* DARK THEME STYLING */
        :root { 
            --bg-dark: #121212; 
            --card-dark: #1e1e1e; 
            --text-light: #e0e0e0; 
            --accent: #bb86fc; 
            --primary-btn: #03dac6;
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-light); }

        /* Login Page */
        #login-page {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1493246507139-91e8bef99c02?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
        }
        .login-box { background: var(--card-dark); padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        
        /* App Layout */
        #app-interface { display: none; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: var(--card-dark); padding: 20px; border-radius: 15px; border: 1px solid #333; }
        
        /* Calendar Dark Overrides */
        .fc { background: var(--card-dark); color: var(--text-light); border-radius: 10px; padding: 10px; }
        .fc-toolbar-title { color: var(--accent); }
        .fc-daygrid-day:hover { background: #2a2a2a !important; cursor: pointer; }
        .fc-list-day-cushion { background: #333 !important; }
        .fc-event { background-color: var(--accent) !important; color: #000 !important; font-weight: bold; border: none; }

        /* Editor Dark Overrides */
        .ql-toolbar { background: #333; border-color: #444 !important; }
        .ql-container { border-color: #444 !important; background: #252525; color: white; font-size: 18px; }
        .ql-snow .ql-stroke { stroke: white !important; }
        
        #note-page { display: none; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        
        /* Highlight & Voice Buttons */
        .highlight-input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #444; border-radius: 8px; background: #252525; color: white; box-sizing: border-box; }
        button { cursor: pointer; border: none; border-radius: 8px; padding: 12px 20px; font-weight: bold; transition: 0.3s; }
        .btn-main { background: var(--primary-btn); color: #000; }
        .btn-voice { background: #cf6679; color: white; }
        .btn-back { background: #444; color: white; }
        #status-msg { color: var(--primary-btn); font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- LOGIN PAGE -->
    <div id="login-page">
        <div class="login-box">
            <h1 style="color:var(--accent)">My Private Diary</h1>
            <p>Welcome back. Please sign in.</p>
            <button class="btn-main" onclick="login()">Login with Google</button>
        </div>
    </div>

    <!-- APP INTERFACE -->
    <div id="app-interface">
        <div class="container">
            
            <!-- CALENDAR VIEW -->
            <div id="calendar-page">
                <div class="toolbar">
                    <h2 id="welcome-msg" style="color:var(--accent)">Diary</h2>
                    <button onclick="logout()" style="background:#444; color: white;">Logout</button>
                </div>
                <div id="calendar"></div>
            </div>

            <!-- NOTE ENTRY VIEW -->
            <div id="note-page">
                <div class="toolbar">
                    <button class="btn-back" onclick="showCalendar()">← Back</button>
                    <h3 id="display-date" style="color:var(--accent)">Date</h3>
                    <button class="btn-main" onclick="saveEntry()">Save to Cloud</button>
                </div>
                
                <input type="text" id="highlight" class="highlight-input" placeholder="Daily Highlight (e.g. આજે બગીચામાં ગયા)">
                
                <div style="margin-bottom: 10px;">
                    <button class="btn-voice" id="voice-btn" onclick="startSpeech()">🎤 Speak in Gujarati</button>
                    <span id="voice-status" style="margin-left:10px; font-size:12px; color:#bbb;"></span>
                </div>

                <div id="editor"></div>
                <p id="status-msg"></p>
            </div>

        </div>
    </div>

    <script>
        const firebaseConfig = {
  apiKey: "AIzaSyCxWGAjeG5OTK1XkpwqtCCmLIz2UN8vAps",
  authDomain: "nirajk-diary.firebaseapp.com",
  projectId: "nirajk-diary",
  storageBucket: "nirajk-diary.firebasestorage.app",
  messagingSenderId: "716509879684",
  appId: "1:716509879684:web:f49ffa26687e1b3ce291d1"
};


        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let selectedDate = "";
        let quill;
        let calendar;

        // Initialize Dark Rich Text Editor
        quill = new Quill('#editor', {
            theme: 'snow',
            modules: { toolbar: [[{'header': [1, 2, false]}], ['bold', 'italic', 'underline'], [{'list': 'ordered'}, {'list': 'bullet'}]] }
        });

        // --- GUJARATI SPEECH TO TEXT LOGIC ---
        function startSpeech() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Your browser does not support voice typing. Please use Chrome on Android/Desktop.");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'gu-IN'; // SET TO GUJARATI
            recognition.interimResults = false;

            const voiceBtn = document.getElementById('voice-btn');
            const voiceStatus = document.getElementById('voice-status');

            recognition.onstart = () => {
                voiceBtn.innerText = "🛑 Listening...";
                voiceStatus.innerText = "બોલો, હું સાંભળું છું... (Speak now)";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                // Insert the spoken text into the editor
                const range = quill.getSelection();
                quill.insertText(range ? range.index : quill.getLength(), transcript + " ");
                voiceStatus.innerText = "Text added!";
            };

            recognition.onerror = () => { voiceStatus.innerText = "Error occurred."; };
            recognition.onend = () => {
                voiceBtn.innerText = "🎤 Speak in Gujarati";
                voiceStatus.innerText = "";
            };

            recognition.start();
        }

        // --- APP LOGIC ---
        function initCalendar() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
                dateClick: (info) => openDiary(info.dateStr),
                events: fetchHighlights
            });
            calendar.render();
        }

        async function fetchHighlights(fetchInfo, successCallback) {
            const user = auth.currentUser;
            if(!user) return;
            const snapshot = await db.collection("diaryEntries").where("uid", "==", user.uid).get();
            const events = snapshot.docs.map(doc => ({
                title: doc.data().highlight || "📄",
                start: doc.data().date,
                allDay: true
            }));
            successCallback(events);
        }

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        }
        function logout() { auth.signOut(); location.reload(); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('app-interface').style.display = 'block';
                document.getElementById('welcome-msg').innerText = "Namaste, " + user.displayName.split(' ')[0];
                initCalendar();
            }
        });

        function openDiary(date) {
            selectedDate = date;
            document.getElementById('calendar-page').style.display = 'none';
            document.getElementById('note-page').style.display = 'block';
            document.getElementById('display-date').innerText = date;
            loadEntry(date);
        }

        function showCalendar() {
            document.getElementById('calendar-page').style.display = 'block';
            document.getElementById('note-page').style.display = 'none';
            calendar.refetchEvents();
        }

        async function loadEntry(date) {
            const user = auth.currentUser;
            const docId = `${user.uid}_${date}`;
            const doc = await db.collection("diaryEntries").doc(docId).get();
            if (doc.exists) {
                quill.root.innerHTML = doc.data().text;
                document.getElementById('highlight').value = doc.data().highlight || "";
            } else {
                quill.root.innerHTML = "";
                document.getElementById('highlight').value = "";
            }
        }

        async function saveEntry() {
            const user = auth.currentUser;
            const docId = `${user.uid}_${selectedDate}`;
            const status = document.getElementById('status-msg');
            status.innerText = "Saving...";
            
            await db.collection("diaryEntries").doc(docId).set({
                uid: user.uid,
                date: selectedDate,
                text: quill.root.innerHTML,
                highlight: document.getElementById('highlight').value,
                lastSaved: firebase.firestore.FieldValue.serverTimestamp()
            });
            status.innerText = "Saved to Cloud!";
            setTimeout(() => { status.innerText = ""; }, 2000);
        }
    </script>
</body>
</html>
