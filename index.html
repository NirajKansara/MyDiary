<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Diary Pro</title>
    
    <!-- Libraries -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --accent: #bc8cf2; --text: #ffffff; --ai-color: #4285f4; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; }
        
        .app-container { max-width: 800px; margin: auto; padding: 15px; box-sizing: border-box; }
        
        /* Login Screen */
        #login-page { 
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1517842645767-c639042777db?auto=format&fit=crop&w=1200&q=80');
            background-size: cover; position: fixed; top: 0; left: 0; width: 100%; z-index: 2000;
        }

        #app-interface { display: none; }
        #note-page { display: none; }

        /* AI Insight Box Styling */
        .ai-display-box { 
            background: rgba(66, 133, 244, 0.15); border: 1px solid var(--ai-color); 
            padding: 15px; border-radius: 12px; margin: 15px 0; display: none;
            animation: slideDown 0.4s ease;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Calendar Styling */
        #calendar { background: var(--card); border-radius: 15px; padding: 10px; border: 1px solid #333; }
        .fc-daygrid-day-number { color: white !important; text-decoration: none !important; }

        /* Input & Editor */
        input.highlight-box { width: 100%; padding: 15px; background: #222; border: 1px solid #444; color: white; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-size: 1rem; }
        .ql-container { height: 300px; background: #222; color: white; border-radius: 0 0 10px 10px; }
        .ql-toolbar { background: #eee !important; border-radius: 10px 10px 0 0; }

        /* Buttons */
        button { padding: 12px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-ai { background: var(--ai-color); color: white; margin-top: 10px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-save { background: var(--accent); color: black; width: 100%; margin-top: 10px; }
        .btn-voice { background: #4caf50; color: white; width: 100%; margin-top: 10px; }
        .btn-back { background: #333; color: white; }
        .btn-logout { background: #333; color: #ff4444; }

        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    </style>
</head>
<body>

    <!-- SCREEN 1: LOGIN -->
    <div id="login-page">
        <h1 style="color:white; font-size: 3rem; margin: 0;">મારી ડાયરી AI</h1>
        <p style="color: #ccc; margin-bottom: 30px;">AI ની મદદથી તમારા વિચારોને સમજો.</p>
        <button style="background: white; color: black; padding: 15px 40px; font-size: 1.2rem;" onclick="login()">Login with Google</button>
    </div>

    <!-- MAIN APP CONTAINER -->
    <div id="app-interface">
        <div class="app-container">
            
            <!-- PAGE 1: CALENDAR -->
            <div id="calendar-page">
                <div class="toolbar">
                    <h2 style="color:var(--accent); margin:0;">નમસ્તે!</h2>
                    <button class="btn-logout" onclick="logout()">Logout</button>
                </div>

                <!-- AI Button on Calendar Page -->
                <button class="btn-ai" id="cal-ai-btn" onclick="analyzeMonth()">
                    ✨ આ મહિનાનો સારાંશ (AI Monthly Review)
                </button>

                <div id="cal-ai-box" class="ai-display-box">
                    <div style="color:var(--ai-color); font-weight:bold;">🤖 Monthly Insight:</div>
                    <div id="cal-ai-text" style="font-style: italic; margin-top:5px;"></div>
                </div>

                <div id="calendar" style="margin-top: 15px;"></div>
            </div>

            <!-- PAGE 2: WRITING PAGE -->
            <div id="note-page">
                <div class="toolbar">
                    <button class="btn-back" onclick="showCalendar()">← Back</button>
                    <div id="display-date" style="color:var(--accent); font-weight:bold;">Date</div>
                </div>

                <!-- AI Button on Writing Page -->
                <button class="btn-ai" id="note-ai-btn" onclick="analyzeDay()">
                    ✨ આજના દિવસ વિશે AI શું કહે છે?
                </button>

                <div id="note-ai-box" class="ai-display-box">
                    <div style="color:var(--ai-color); font-weight:bold;">🤖 Daily Insight:</div>
                    <div id="note-ai-text" style="font-style: italic; margin-top:5px;"></div>
                </div>

                <input type="text" id="highlight" class="highlight-box" placeholder="Daily Highlight (ટૂંકમાં વિગત)">
                <div id="editor"></div>
                
                <button class="btn-voice" onclick="startSpeech()">🎤 Speak in Gujarati</button>
                <button class="btn-save" onclick="saveEntry()">Save Entry</button>
                <p id="status-msg" style="text-align: center; color: #03dac6; margin-top: 10px;"></p>
            </div>

        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION (REPLACE THESE) ---
  const firebaseConfig = {
 apiKey: "AIzaSyCxWGAjeG5OTK1XkpwqtCCmLIz2UN8vAps",
 authDomain: "nirajk-diary.firebaseapp.com",
projectId: "nirajk-diary",
 storageBucket: "nirajk-diary.firebasestorage.app",
 messagingSenderId: "716509879684",
 appId: "1:716509879684:web:f49ffa26687e1b3ce291d1"
};

        
        const GEMINI_API_KEY = "AIzaSyB8iP6-B3vCIAp2PauivDQ7TXAeG2XVkzU";

        // --- 2. INITIALIZATION ---
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let selectedDate = "";
        let quill = new Quill('#editor', { theme: 'snow', modules: { toolbar: [['bold', 'italic', 'underline'], [{'list': 'bullet'}]] } });
        let calendar;

        // --- 3. AI CORE FUNCTION ---
        async function callGeminiAI(prompt) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                return data.candidates[0].content.parts[0].text;
            } catch (error) {
                console.error(error);
                return "Error: " + error.message;
            }
        }

        // --- 4. AI ACTIONS ---
        async function analyzeDay() {
            const text = quill.getText().trim();
            if (text.length < 5) return alert("પહેલા કંઈક લખો!");
            
            const box = document.getElementById('note-ai-box');
            const target = document.getElementById('note-ai-text');
            box.style.display = "block";
            target.innerText = "AI વિચારી રહ્યું છે...";

            const result = await callGeminiAI(`Analyze this diary entry: "${text}". Give a supportive response in Gujarati and detect mood.`);
            target.innerText = result;
        }

        async function analyzeMonth() {
            const box = document.getElementById('cal-ai-box');
            const target = document.getElementById('cal-ai-text');
            box.style.display = "block";
            target.innerText = "તમારા આખા મહિનાના ડેટાનું વિશ્લેષણ થઈ રહ્યું છે...";

            const user = auth.currentUser;
            const snapshot = await db.collection("diaryEntries").where("uid", "==", user.uid).limit(10).get();
            let combinedText = snapshot.docs.map(d => d.data().highlight).join(", ");

            if (!combinedText) {
                target.innerText = "વિશ્લેષણ કરવા માટે પૂરતો ડેટા નથી.";
                return;
            }

            const result = await callGeminiAI(`Here are the highlights of my month: ${combinedText}. Summarize my month and give me one piece of advice in Gujarati.`);
            target.innerText = result;
        }

        // --- 5. CALENDAR & DATABASE LOGIC ---
        function initCalendar() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', height: 'auto',
                dateClick: (info) => openDiary(info.dateStr),
                events: async function(info, success) {
                    const user = auth.currentUser;
                    const snapshot = await db.collection("diaryEntries").where("uid", "==", user.uid).get();
                    success(snapshot.docs.map(doc => ({ title: doc.data().highlight || "📄", start: doc.data().date, color: '#bc8cf2', textColor: 'black' })));
                }
            });
            calendar.render();
        }

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { auth.signOut(); location.reload(); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('app-interface').style.display = 'block';
                initCalendar();
            }
        });

        function openDiary(date) {
            selectedDate = date;
            document.getElementById('calendar-page').style.display = 'none';
            document.getElementById('note-page').style.display = 'block';
            document.getElementById('display-date').innerText = date;
            document.getElementById('note-ai-box').style.display = 'none';
            loadEntry(date);
        }

        function showCalendar() {
            document.getElementById('calendar-page').style.display = 'block';
            document.getElementById('note-page').style.display = 'none';
            calendar.refetchEvents();
        }

        async function loadEntry(date) {
            const user = auth.currentUser;
            const doc = await db.collection("diaryEntries").doc(`${user.uid}_${date}`).get();
            if (doc.exists) {
                quill.root.innerHTML = doc.data().text;
                document.getElementById('highlight').value = doc.data().highlight || "";
            } else {
                quill.root.innerHTML = "";
                document.getElementById('highlight').value = "";
            }
        }

        async function saveEntry() {
            const user = auth.currentUser;
            document.getElementById('status-msg').innerText = "Saving...";
            await db.collection("diaryEntries").doc(`${user.uid}_${selectedDate}`).set({
                uid: user.uid, date: selectedDate,
                text: quill.root.innerHTML,
                highlight: document.getElementById('highlight').value
            });
            document.getElementById('status-msg').innerText = "✓ Saved!";
            setTimeout(() => { document.getElementById('status-msg').innerText = ""; }, 2000);
        }

        function startSpeech() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'gu-IN';
            rec.onstart = () => { document.getElementById('status-msg').innerText = "Listening..."; };
            rec.onresult = (e) => { quill.insertText(quill.getLength(), " " + e.results[0][0].transcript); };
            rec.start();
        }
    </script>
</body>
</html>
